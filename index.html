<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>African FastCash Loans</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f4f4;
color:#333;
}
header{
background:#0b5ed7;
color:white;
padding:20px;
text-align:center;
}
.hero{
padding:40px 20px;
text-align:center;
background:white;
}
.section{
padding:30px 20px;
max-width:900px;
margin:auto;
}
.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
input,select,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}
button{
background:#0b5ed7;
color:white;
border:none;
padding:15px;
width:100%;
border-radius:6px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<h2>African FastCash Loans</h2>
<p>Fast • Secure • Reliable Loans</p>
</header>

<section class="hero">
<h1>Apply for a Loan Online</h1>
<p>Fill the form below to apply instantly</p>
</section>

<section class="section">
<div class="card">

<h2>Loan Application</h2>

<form id="loanForm">

<input name="full_name" type="text" placeholder="Full Name" required>

<input name="phone" type="tel" placeholder="Phone Number" required>

<input name="email" type="email" placeholder="Email (Optional)">

<input name="national_id" type="text" placeholder="National ID" required>

<input name="loan_amount" type="number" placeholder="Loan Amount" required>

<select name="loan_purpose" required>
<option value="">Select Purpose</option>
<option>Business</option>
<option>Education</option>
<option>Medical</option>
<option>Personal</option>
</select>

<textarea name="additional_info" placeholder="Additional Info"></textarea>

<button type="submit">Submit Application</button>

</form>

<p id="msg"></p>

</div>
</section>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://irmqjizwqvsbfextuxtr.supabase.co",
  "sb_publishable_lGyCvb--uFKzYJXSC_WJow_Kjul-Dk3"
);

document.getElementById("loanForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(e.target));

  const { error } = await supabase
    .from("applications")
    .insert([data]);

  if (error) {
    console.log(error);
    document.getElementById("msg").innerText = "❌ Failed to submit";
  } else {
    document.getElementById("msg").innerText = "✅ Application submitted!";
    e.target.reset();
  }
});
</script>

<script>
alert("JS IS WORKING");
</script>/body>
</html>
